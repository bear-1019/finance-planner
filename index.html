<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#3f586d">
<link rel="manifest" href="manifest.webmanifest">
<title>人生財務模擬器</title>
<style>
:root{
 --bg:#f6f3ed;--paper:#fffdfa;--ink:#263b52;--muted:#7d8893;--line:#e5ddd2;
 --navy:#3f586d;--mist:#e8eef0;--sage:#e9f0ec;--sand:#f4eddf;--rose:#f4e8e6;
 --good:#39745e;--warn:#9b6d2f;--bad:#aa5050;--shadow:0 10px 30px rgba(45,55,65,.07)
}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;line-height:1.5}button,input,select{font:inherit}.app{max-width:920px;margin:auto;padding:12px 12px 92px}
.hero{padding:24px;border-radius:28px;background:linear-gradient(140deg,#3b5368,#66818f 72%,#9dadA6);color:#fff;box-shadow:var(--shadow)}.hero-mark{width:48px;height:48px;border-radius:15px;background:rgba(255,255,255,.15);display:grid;place-items:center;margin-bottom:14px}.hero-mark svg{width:28px;height:28px}.hero h1{margin:0;font-size:29px}.hero p{margin:6px 0 0;opacity:.9}.hero-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:17px}
.btn{border:0;border-radius:14px;padding:11px 15px;font-weight:800;background:var(--navy);color:#fff;cursor:pointer}.btn.white{background:#fff;color:var(--navy)}.btn.ghost{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28)}.btn.soft{background:#e9e5dd;color:var(--ink)}.btn.small{padding:8px 11px;font-size:13px}
.nav{position:sticky;top:7px;z-index:20;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:13px 0;padding:7px;border:1px solid var(--line);border-radius:19px;background:rgba(246,243,237,.93);backdrop-filter:blur(14px)}.nav button{border:0;background:transparent;border-radius:13px;padding:10px 5px;color:var(--muted);font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px}.nav button svg{width:19px;height:19px}.nav button.active{background:#e2e9eb;color:var(--navy)}
.page{display:none}.page.active{display:block}.card{margin:12px 0;padding:17px;border:1px solid var(--line);border-radius:22px;background:var(--paper);box-shadow:var(--shadow)}.head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:13px}.title{display:flex;gap:10px}.ico{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto}.ico svg{width:21px;height:21px}.blue{background:var(--mist);color:#5d7d8a}.green{background:var(--sage);color:#638173}.gold{background:var(--sand);color:#95713d}.head h2{margin:1px 0 0;font-size:20px}.sub{margin-top:4px;color:var(--muted);font-size:14px}
.badge{padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800}.badge.good{background:#e5f1e9;color:var(--good)}.badge.warn{background:#f6eddc;color:var(--warn)}.badge.bad{background:#f5e5e3;color:var(--bad)}
.hero-result{padding:16px;border-radius:19px}.hero-result.good{background:#eaf3ed}.hero-result.warn{background:#f8f0e1}.hero-result.bad{background:#f7e8e6}.hero-result h3{font-size:19px;margin:0 0 6px}.hero-result p{margin:0}
.decision-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:12px}.decision-item{padding:12px;border-radius:14px;background:rgba(255,255,255,.68)}.decision-item small{display:block;color:var(--muted)}.decision-item b{display:block;font-size:17px;margin-top:3px}.good-t{color:var(--good)}.bad-t{color:var(--bad)}
.route-card{display:grid;grid-template-columns:92px minmax(0,1fr);gap:12px;padding:13px;border-radius:16px;background:#f3efe8;margin-bottom:9px}.route-card.car{background:#eaf0f3}.route-card.home{background:#e8f0eb}.route-card h3{margin:0;font-size:16px}.route-card .route-meta{display:flex;justify-content:space-between;gap:12px}.route-card small{color:var(--muted)}.route-card strong{font-size:18px}.bar{height:7px;background:#ded8cf;border-radius:999px;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;background:#718f9e;border-radius:999px}
.workspace{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}.panel{padding:15px;border-radius:19px;border:1px solid var(--line);background:#fff}.panel h3{margin:0 0 8px}.panel p{color:var(--muted);font-size:14px;margin-bottom:12px}.action-list{display:grid;gap:8px}.action{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px;border:0;border-radius:14px;background:#f3efe8;color:var(--ink);text-align:left}.action b{display:block}.action small{display:block;color:var(--muted);margin-top:2px}
.summary{display:grid;gap:8px}.sum{display:flex;justify-content:space-between;gap:12px;padding:11px 12px;border-radius:14px;background:#f3efe8}.sum span{color:var(--muted)}.sum b{text-align:right}
.year-plan{border:1px solid var(--line);border-radius:17px;background:#fff;margin-bottom:9px}.year-plan-top{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:13px}.year-plan h3{margin:0}.year-plan-body{display:none;padding:0 13px 13px}.year-plan.open .year-plan-body{display:block}.mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.mini{padding:10px;border-radius:12px;background:#f3efe8}.mini small{display:block;color:var(--muted)}.mini b{display:block}
.scenario{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.scenario button{border:1px solid var(--line);background:#fff;border-radius:13px;padding:10px 4px;font-weight:800;color:var(--ink)}.scenario button.active{background:#e2e9eb;color:var(--navy);border-color:#cbd6da}
.year-list{display:grid;gap:9px}.year-card{padding:13px;border:1px solid var(--line);border-radius:18px;background:#fff}.year-top{display:flex;justify-content:space-between;gap:12px}.year-top h3{margin:0}.year-assets{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}.asset{padding:9px;border-radius:12px;background:#f3efe8}.asset small{display:block;color:var(--muted);font-size:12px}.asset b{display:block;font-size:14px}.year-actions{display:flex;justify-content:flex-end;margin-top:9px}
.modal,.drawer{position:fixed;inset:0;display:none;align-items:flex-end;padding:14px;background:rgba(31,42,55,.45);z-index:100}.modal.show,.drawer.show{display:flex}.sheet{width:min(720px,100%);max-height:91vh;overflow:auto;margin:auto;padding:17px;border-radius:24px 24px 18px 18px;background:var(--paper)}.sheet-head{position:sticky;top:-17px;z-index:2;display:flex;justify-content:space-between;align-items:center;gap:8px;padding:3px 0 12px;background:var(--paper)}.sheet-head-actions{display:flex;gap:8px}.close{border:0;width:38px;height:38px;border-radius:50%;background:#e9e5dd;color:var(--ink);font-size:20px}.fields{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field label{display:block;margin-bottom:5px;color:var(--muted);font-size:13px}.field input,.field select{width:100%;padding:12px;border:1px solid #d8d0c4;border-radius:13px;background:#fff;color:var(--ink);font-size:17px}.field.check{display:flex;align-items:center;gap:8px;padding:12px;border-radius:13px;background:#f2eee7}.field.check input{width:auto}.field.check label{margin:0;color:var(--ink);font-weight:700}.note{margin-top:10px;padding:10px;border-radius:13px;background:#f3efe8;color:var(--muted);font-size:13px}.sheet-bottom{position:sticky;bottom:-17px;display:flex;gap:9px;padding:12px 0 3px;background:var(--paper)}.sheet-bottom .btn{flex:1}
.flow{display:grid;gap:9px}.flow-block{padding:12px;border-radius:16px}.flow-block.cash{background:#eaf1f4}.flow-block.asset{background:#f3eee4}.flow-block.ins{background:#eaf1ec}.flow-block.total{background:#e8f1eb}.flow-block h4{display:flex;justify-content:space-between;gap:10px;margin:0 0 6px}.line{display:grid;grid-template-columns:minmax(0,1fr) minmax(120px,1.2fr);gap:12px;padding:5px 0;border-bottom:1px dashed rgba(50,65,80,.15);font-size:13px}.line span{color:#6f7d89}.line b{text-align:right;overflow-wrap:anywhere}
.report{display:none}@page{size:A4 portrait;margin:10mm}@media print{body{background:#fff}.app>*:not(.report){display:none!important}.report{display:block!important}.report-page{page-break-after:always}.report-page:last-child{page-break-after:auto}.report-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}.report-year{border:1px solid #ddd5ca;border-radius:8px;padding:7px}.report-year h4{font-size:11px;margin:0 0 4px}.report-year div{display:flex;justify-content:space-between;font-size:8.5px;padding:2px 0}.report-page h2{font-size:18px}}
@media(max-width:680px){.decision-grid,.workspace,.fields{grid-template-columns:1fr}.year-assets{grid-template-columns:repeat(2,1fr)}.line{grid-template-columns:1fr}.line b{text-align:left}.nav button{font-size:12px}.route-card{grid-template-columns:78px 1fr}}
</style>
</head>
<body>
<div class="app">
<header class="hero"><div class="hero-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V9m6 10V5m6 14v-7m4 7H2"/><path d="m4 8 6-4 6 7 4-3"/></svg></div><h1>人生財務模擬器</h1><p>回答兩個問題：買得起嗎？買了之後還能不能繼續累積資產？</p><div class="hero-actions"><button class="btn white" onclick="startPlan()">重新規劃</button><button class="btn ghost" onclick="printReport()">匯出報告</button></div></header>
<nav class="nav"><button class="active" data-page="decision"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/></svg>結果</button><button data-page="plan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h16"/></svg>規劃</button><button data-page="trace"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/></svg>追查</button></nav>

<section id="decision" class="page active">
<article class="card"><div class="head"><div class="title"><div class="ico blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 15h18l-2-6H5z"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg></div><div><h2>買車判斷</h2><div class="sub">現金安全、年度負擔與買房延後程度。</div></div></div><span id="carBadge" class="badge">—</span></div><div id="carResult"></div></article>
<article class="card"><div class="head"><div class="title"><div class="ico green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11 12 3l9 8"/><path d="M5 10v11h14V10M9 21v-7h6v7"/></svg></div><div><h2>買房判斷</h2><div class="sub">購屋資金、房貸後現金流與安全餘額。</div></div></div><span id="homeBadge" class="badge">—</span></div><div id="homeResult"></div></article>
<article class="card"><div class="head"><div class="title"><div class="ico gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V9m6 10V5m6 14v-7m4 7H2"/></svg></div><div><h2>三種人生路線</h2><div class="sub">直接比較目標年度的總資產與現金。</div></div></div></div><div id="routes"></div></article>
<article class="card"><div class="workspace"><div class="panel"><h3>下一步</h3><p>不用逐頁找設定，直接從這裡處理。</p><div class="action-list"><button class="action" onclick="startPlan()"><span><b>重新規劃</b><small>用引導式流程修改全部假設</small></span><span>›</span></button><button class="action" onclick="go('trace')"><span><b>追查數字</b><small>查看某一年為什麼變多或變少</small></span><span>›</span></button><button class="action" onclick="printReport()"><span><b>匯出 PDF</b><small>摘要與三種情境年度資料</small></span><span>›</span></button></div></div><div class="panel"><h3>目前假設</h3><div id="assumptions" class="summary"></div></div></div></article>
</section>

<section id="plan" class="page">
<article class="card"><div class="head"><div class="title"><div class="ico blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h16"/></svg></div><div><h2>規劃設定</h2><div class="sub">先用整體假設，只有例外年份才個別修改。</div></div></div><button class="btn small" onclick="startPlan()">引導式修改</button></div><div id="planSummary" class="summary"></div></article>
<article class="card"><div class="head"><div class="title"><div class="ico gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4m8-4v4M3 9h18"/></svg></div><div><h2>年度例外</h2><div class="sub">預設沿用上一年；只有收入或分配不同時才修改。</div></div></div></div><div id="yearPlans"></div></article>
</section>

<section id="trace" class="page">
<article class="card"><div class="head"><div class="title"><div class="ico green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/></svg></div><div><h2>資金追查</h2><div class="sub">選情境、選年份，再看完整算式。</div></div></div></div><div class="scenario"><button class="active" data-scenario="base">都不買</button><button data-scenario="car">只買車</button><button data-scenario="home">買車再買房</button></div><div id="years" class="year-list"></div></article>
</section>

<section id="report" class="report"></section>
</div>

<div id="modal" class="modal"><div class="sheet"><div class="sheet-head"><h2 id="modalTitle">設定</h2><div class="sheet-head-actions"><button class="btn small" onclick="saveModal()">儲存</button><button class="close" onclick="closeModal()">×</button></div></div><div id="modalFields" class="fields"></div><div id="modalNote" class="note"></div><div class="sheet-bottom"><button class="btn soft" onclick="closeModal()">取消</button><button class="btn" onclick="saveModal()">儲存</button></div></div></div>
<div id="drawer" class="drawer"><div class="sheet"><div class="sheet-head"><h2 id="drawerTitle">計算過程</h2><button class="close" onclick="closeDrawer()">×</button></div><div id="drawerBody"></div></div></div>

<script>
const START=2027,MAX=2045,KEY='lifeFinanceV1';
const D={meta:{endYear:2035},start:{cash:840000,stocks:180000,company:60000,insuranceUSD:8000,fx:31.5},base:{monthlySalary:90000,annualSalary:1800000,living:40000,travel:10000,stocks:14000,company:6000,insuranceUSD:317.46,fx:31.5},overrides:{2028:{annualSalary:1900000},2029:{annualSalary:2000000},2030:{annualSalary:2000000},2031:{annualSalary:2100000}},car:{price:1899900,down:399900,rate:2.5,months:120,year:2027,month:7,fixed:9000},home:{price:20000000,year:2031,month:7,ltv:85,rate:2.5,years:40,extra:1500000,reserve:500000,monthlyOther:6000,mortgageYear:2031,mortgageMonth:8,useStocks:false,useInsurance:false}};
let data=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(D),results={},scenario='base',saveFn=null,flowStep=0;
const fmt=n=>new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',maximumFractionDigits:0}).format(Math.round(n||0));
const usd=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n||0);
const ym=(y,m)=>y*12+m;
function pmt(P,a,n){const r=a/100/12;return r?P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):P/n}
function yearConfig(y){return {...data.base,...(data.overrides[y]||{})}}
function useHome(a,need,fx){let cash=Math.min(Math.max(0,a.cash-data.home.reserve),need);a.cash-=cash;need-=cash;let stocks=0,insTWD=0,insUSD=0;if(need>0&&data.home.useStocks){stocks=Math.min(a.stocks,need);a.stocks-=stocks;need-=stocks}if(need>0&&data.home.useInsurance){insTWD=Math.min(a.insuranceUSD*fx,need);insUSD=insTWD/fx;a.insuranceUSD-=insUSD;need-=insTWD}if(need>0){a.cash-=need;cash+=need}return{cash,stocks,insTWD,insUSD}}
function simulate(mode){let a={cash:data.start.cash,stocks:data.start.stocks,company:data.start.company,insuranceUSD:data.start.insuranceUSD},out=[],carPaid=0,mortPaid=0,bought=false;const carLoan=data.car.price-data.car.down,carPay=pmt(carLoan,data.car.rate,data.car.months),homeLoan=data.home.price*data.home.ltv/100,mortPay=pmt(homeLoan,data.home.rate,data.home.years*12),buyKey=ym(data.home.year,data.home.month),mortKey=Math.max(buyKey,ym(data.home.mortgageYear,data.home.mortgageMonth));for(let y=START;y<=data.meta.endYear;y++){const z=yearConfig(y),start={...a},bonus=Math.max(0,z.annualSalary-z.monthlySalary*12);let carOne=0,carMonths=0,homeCash=0,homeStocks=0,homeInsTWD=0,homeInsUSD=0,mortMonths=0,homeMonths=0;for(let m=1;m<=12;m++){a.cash+=z.monthlySalary-z.living-z.travel-z.stocks-z.company-z.insuranceUSD*z.fx;a.stocks+=z.stocks;a.company+=z.company;a.insuranceUSD+=z.insuranceUSD;const k=ym(y,m);if((mode==='car'||mode==='home')&&k>=ym(data.car.year,data.car.month)){if(k===ym(data.car.year,data.car.month)){carOne=data.car.down;a.cash-=carOne}if(carPaid<data.car.months){a.cash-=carPay;carPaid++}a.cash-=data.car.fixed;carMonths++}if(mode==='home'&&k===buyKey&&!bought){const need=(data.home.price-homeLoan)+data.home.extra,u=useHome(a,need,z.fx);homeCash=u.cash;homeStocks=u.stocks;homeInsTWD=u.insTWD;homeInsUSD=u.insUSD;bought=true}if(mode==='home'&&bought&&k>=buyKey){a.cash-=data.home.monthlyOther;homeMonths++}if(mode==='home'&&bought&&k>=mortKey&&mortPaid<data.home.years*12){a.cash-=mortPay;mortPaid++;mortMonths++}}a.cash+=bonus;const insTWD=a.insuranceUSD*z.fx;out.push({year:y,start,end:{...a},total:a.cash+a.stocks+a.company+insTWD,insTWD,z,bonus,carOne,carPay,carMonths,homeCash,homeStocks,homeInsTWD,homeInsUSD,mortPay,mortMonths,homeMonths})}return out}
function recalc(){results={base:simulate('base'),car:simulate('car'),home:simulate('home')};localStorage.setItem(KEY,JSON.stringify(data));render()}
function render(){renderDecision();renderPlan();renderYears();renderReport()}
function badge(id,text,type){const e=document.getElementById(id);e.textContent=text;e.className='badge '+type}
function sum(k,v){return `<div class="sum"><span>${k}</span><b>${v}</b></div>`}
function renderDecision(){const ci=Math.max(0,Math.min(results.base.length-1,data.car.year-START)),hi=Math.max(0,Math.min(results.base.length-1,data.home.year-START)),c=results.car[ci],bc=results.base[ci],h=results.home[hi],bh=results.base[hi],ch=results.car[hi],cFlow=c.end.cash-c.start.cash,cOk=c.end.cash>=data.home.reserve&&cFlow>=0;badge('carBadge',cOk?'可行':c.end.cash>=0?'偏緊':'不可行',cOk?'good':c.end.cash>=0?'warn':'bad');document.getElementById('carResult').innerHTML=`<div class="hero-result ${cOk?'good':c.end.cash>=0?'warn':'bad'}"><h3>${cOk?'買車不會破壞買房計畫':'買車會明顯壓縮現金'}</h3><p>${data.car.year}/${data.car.month} 交車，當年底現金 ${fmt(c.end.cash)}。</p><div class="decision-grid"><div class="decision-item"><small>月付車貸</small><b>${fmt(c.carPay)}</b></div><div class="decision-item"><small>車輛固定費／月</small><b>${fmt(data.car.fixed)}</b></div><div class="decision-item"><small>交車年度總車費</small><b>${fmt(c.carOne+(c.carPay+data.car.fixed)*c.carMonths)}</b></div><div class="decision-item"><small>相較都不買少的現金</small><b>${fmt(bc.end.cash-c.end.cash)}</b></div></div></div>`;const need=data.home.price*(1-data.home.ltv/100)+data.home.extra,paid=h.homeCash+h.homeStocks+h.homeInsTWD,hFlow=h.end.cash-h.start.cash,okMoney=paid>=need-1,hOk=okMoney&&h.end.cash>=0&&hFlow>=0;badge('homeBadge',hOk?'可行':okMoney?'偏緊':'不足',hOk?'good':okMoney?'warn':'bad');document.getElementById('homeResult').innerHTML=`<div class="hero-result ${hOk?'good':okMoney?'warn':'bad'}"><h3>${hOk?'購屋資金與後續現金流皆可承擔':okMoney?'買得下，但當年壓力高':'目標時間資金不足'}</h3><p>${data.home.year}/${data.home.month} 購屋，一次性需求 ${fmt(need)}。</p><div class="decision-grid"><div class="decision-item"><small>現金動用</small><b>${fmt(h.homeCash)}</b></div><div class="decision-item"><small>其他資產動用</small><b>${fmt(h.homeStocks+h.homeInsTWD)}</b></div><div class="decision-item"><small>房貸＋住房費／月</small><b>${fmt(h.mortPay+data.home.monthlyOther)}</b></div><div class="decision-item"><small>購屋年底現金</small><b class="${h.end.cash>=0?'good-t':'bad-t'}">${fmt(h.end.cash)}</b></div></div></div>`;const values=[bh.total,ch.total,h.total],max=Math.max(...values);document.getElementById('routes').innerHTML=[['都不買','',bh],['只買車','car',ch],['買車再買房','home',h]].map(([n,cl,r])=>`<div class="route-card ${cl}"><h3>${n}</h3><div><div class="route-meta"><small>現金 ${fmt(r.end.cash)}</small><strong>${fmt(r.total)}</strong></div><div class="bar"><i style="width:${Math.max(3,r.total/max*100)}%"></i></div></div></div>`).join('');document.getElementById('assumptions').innerHTML=sum('顯示範圍',`${START}～${data.meta.endYear}`)+sum('買車時間',`${data.car.year}/${data.car.month}`)+sum('買房時間',`${data.home.year}/${data.home.month}`)+sum('房屋總價',fmt(data.home.price))}
function renderPlan(){document.getElementById('planSummary').innerHTML=sum('起始現金',fmt(data.start.cash))+sum('起始投資',fmt(data.start.stocks+data.start.company))+sum('美元儲蓄險',usd(data.start.insuranceUSD))+sum('基本月薪',fmt(data.base.monthlySalary))+sum('基本年薪',fmt(data.base.annualSalary))+sum('每月生活＋旅遊',fmt(data.base.living+data.base.travel))+sum('每月投資＋認股',fmt(data.base.stocks+data.base.company));let h='';for(let y=START;y<=data.meta.endYear;y++){const z=yearConfig(y),isOverride=!!data.overrides[y];h+=`<div class="year-plan"><div class="year-plan-top"><div><h3>${y} 年${isOverride?'（已調整）':''}</h3><div class="sub">年薪 ${fmt(z.annualSalary)}｜月薪 ${fmt(z.monthlySalary)}</div></div><div><button class="btn soft small" onclick="editYear(${y})">修改</button> <button class="btn soft small" onclick="this.closest('.year-plan').classList.toggle('open')">摘要</button></div></div><div class="year-plan-body"><div class="mini-grid"><div class="mini"><small>生活＋旅遊／月</small><b>${fmt(z.living+z.travel)}</b></div><div class="mini"><small>投資＋認股／月</small><b>${fmt(z.stocks+z.company)}</b></div><div class="mini"><small>儲蓄險／月</small><b>${usd(z.insuranceUSD)}</b></div><div class="mini"><small>匯率</small><b>${z.fx}</b></div></div></div></div>`}document.getElementById('yearPlans').innerHTML=h}
function renderYears(){const names={base:'都不買',car:'只買車',home:'買車再買房'};document.getElementById('years').innerHTML=results[scenario].map((r,i)=>`<article class="year-card"><div class="year-top"><div><h3>${r.year} 年底</h3><div class="sub">${names[scenario]}｜現金變動 <span class="${r.end.cash-r.start.cash>=0?'good-t':'bad-t'}">${fmt(r.end.cash-r.start.cash)}</span></div></div><b>${fmt(r.total)}</b></div><div class="year-assets"><div class="asset"><small>現金</small><b>${fmt(r.end.cash)}</b></div><div class="asset"><small>股票</small><b>${fmt(r.end.stocks)}</b></div><div class="asset"><small>認股</small><b>${fmt(r.end.company)}</b></div><div class="asset"><small>儲蓄險</small><b>${usd(r.end.insuranceUSD)}</b></div></div><div class="year-actions"><button class="btn soft small" onclick="openDrawer('${scenario}',${i})">看計算過程</button></div></article>`).join('')}
function line(k,v,cl=''){return `<div class="line"><span>${k}</span><b class="${cl}">${v}</b></div>`}
function detail(r){const z=r.z,monthly=z.monthlySalary-z.living-z.travel-z.stocks-z.company-z.insuranceUSD*z.fx;return `<div class="flow"><div class="flow-block cash"><h4><span>現金</span><b>${fmt(r.end.cash)}</b></h4>${line('前一年底',fmt(r.start.cash))}${line('每月可留現金 × 12',`${fmt(monthly)} × 12 = ${fmt(monthly*12)}`)}${line('年終／分紅','＋ '+fmt(r.bonus),'good-t')}${r.carOne?line('車子頭期','− '+fmt(r.carOne),'bad-t'):''}${r.carMonths?line('車貸＋固定車費',`− ${fmt(r.carPay+data.car.fixed)} × ${r.carMonths}`,'bad-t'):''}${r.homeCash?line('購屋現金','− '+fmt(r.homeCash),'bad-t'):''}${r.mortMonths?line('房貸','− '+fmt(r.mortPay)+' × '+r.mortMonths,'bad-t'):''}${r.homeMonths?line('住房固定費','− '+fmt(data.home.monthlyOther)+' × '+r.homeMonths,'bad-t'):''}</div><div class="flow-block asset"><h4><span>台股／ETF</span><b>${fmt(r.end.stocks)}</b></h4>${line('前一年底',fmt(r.start.stocks))}${line('每月投入 × 12',`${fmt(z.stocks)} × 12`)}${r.homeStocks?line('購屋動用','− '+fmt(r.homeStocks),'bad-t'):''}</div><div class="flow-block asset"><h4><span>公司認股</span><b>${fmt(r.end.company)}</b></h4>${line('前一年底',fmt(r.start.company))}${line('每月投入 × 12',`${fmt(z.company)} × 12`)}</div><div class="flow-block ins"><h4><span>美元儲蓄險</span><b>${usd(r.end.insuranceUSD)}</b></h4>${line('前一年底',usd(r.start.insuranceUSD))}${line('每月投入 × 12',`${usd(z.insuranceUSD)} × 12`)}${r.homeInsUSD?line('購屋動用','− '+usd(r.homeInsUSD),'bad-t'):''}${line('台幣估值',fmt(r.insTWD))}</div><div class="flow-block total"><h4><span>年底總金融資產</span><b>${fmt(r.total)}</b></h4>${line('現金',fmt(r.end.cash))}${line('股票',fmt(r.end.stocks))}${line('認股',fmt(r.end.company))}${line('儲蓄險估值',fmt(r.insTWD))}</div></div>`}
function openDrawer(k,i){const r=results[k][i];document.getElementById('drawerTitle').textContent=`${r.year} 年底計算過程`;document.getElementById('drawerBody').innerHTML=detail(r);document.getElementById('drawer').classList.add('show')}
function closeDrawer(){document.getElementById('drawer').classList.remove('show')}
function renderReport(){const names={base:'都不買',car:'只買車',home:'買車再買房'};let h=`<div class="report-page"><h2>人生財務模擬器摘要</h2><p>顯示至 ${data.meta.endYear} 年底</p><div class="report-grid">`;for(const k of ['base','car','home']){const r=results[k][Math.min(results[k].length-1,data.home.year-START)];h+=`<div class="report-year"><h4>${names[k]}</h4><div><span>總資產</span><b>${fmt(r.total)}</b></div><div><span>現金</span><b>${fmt(r.end.cash)}</b></div></div>`}h+=`</div></div>`;for(const k of ['base','car','home']){h+=`<div class="report-page"><h2>${names[k]}</h2><div class="report-grid">`;for(const r of results[k])h+=`<div class="report-year"><h4>${r.year} 年底</h4><div><span>現金</span><b>${fmt(r.end.cash)}</b></div><div><span>股票</span><b>${fmt(r.end.stocks)}</b></div><div><span>認股</span><b>${fmt(r.end.company)}</b></div><div><span>儲蓄險</span><b>${fmt(r.insTWD)}</b></div><div><span>總資產</span><b>${fmt(r.total)}</b></div></div>`;h+=`</div></div>`}document.getElementById('report').innerHTML=h}
function go(id){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===id));document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===id));window.scrollTo({top:0,behavior:'smooth'})}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>go(b.dataset.page));document.querySelectorAll('[data-scenario]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-scenario]').forEach(x=>x.classList.remove('active'));b.classList.add('active');scenario=b.dataset.scenario;renderYears()});
function f(k,l,v,step=1){return `<div class="field"><label>${l}</label><input data-k="${k}" type="number" step="${step}" value="${v}"></div>`}
function sel(k,l,v,arr){return `<div class="field"><label>${l}</label><select data-k="${k}">${arr.map(x=>`<option value="${x}" ${Number(x)===Number(v)?'selected':''}>${x}</option>`).join('')}</select></div>`}
function ck(k,l,v){return `<div class="field check"><input data-k="${k}" type="checkbox" ${v?'checked':''}><label>${l}</label></div>`}
const years=()=>Array.from({length:MAX-START+1},(_,i)=>START+i),months=()=>Array.from({length:12},(_,i)=>i+1);
function openModal(title,fields,note,save){document.getElementById('modalTitle').textContent=title;document.getElementById('modalFields').innerHTML=fields;document.getElementById('modalNote').textContent=note;saveFn=save;document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show');saveFn=null}
function values(){const o={};document.querySelectorAll('#modalFields [data-k]').forEach(e=>o[e.dataset.k]=e.type==='checkbox'?e.checked:Number(e.value||0));return o}
function saveModal(){if(saveFn)saveFn(values());closeModal();recalc()}
function startPlan(){flowStep=0;nextPlan()}
function nextPlan(){if(flowStep===0)openModal('1／5 現在擁有什麼',f('cash','現金',data.start.cash)+f('stocks','台股／ETF',data.start.stocks)+f('company','公司認股',data.start.company)+f('insuranceUSD','美元儲蓄險',data.start.insuranceUSD,.01)+f('fx','美元匯率',data.start.fx,.01),'儲存後進入下一步。',v=>{Object.assign(data.start,v);flowStep++;setTimeout(nextPlan,50)});else if(flowStep===1)openModal('2／5 每年通常怎麼運用收入',f('monthlySalary','基本月薪',data.base.monthlySalary)+f('annualSalary','基本年薪',data.base.annualSalary)+f('living','每月生活支出',data.base.living)+f('travel','每月旅遊基金',data.base.travel)+f('stocks','每月台股／ETF',data.base.stocks)+f('company','每月公司認股',data.base.company)+f('insuranceUSD','每月儲蓄險（USD）',data.base.insuranceUSD,.01)+f('fx','美元匯率',data.base.fx,.01),'這是預設值，特殊年份可另外修改。',v=>{Object.assign(data.base,v);flowStep++;setTimeout(nextPlan,50)});else if(flowStep===2)openModal('3／5 買車計畫',f('price','車價',data.car.price)+f('down','頭期款',data.car.down)+f('rate','車貸利率（%）',data.car.rate,.01)+f('months','貸款月數',data.car.months)+sel('year','交車年份',data.car.year,years())+sel('month','交車月份',data.car.month,months())+f('fixed','每月固定車費',data.car.fixed),'固定車費包含保險、能源、停車、保養與稅費。',v=>{Object.assign(data.car,v);flowStep++;setTimeout(nextPlan,50)});else if(flowStep===3)openModal('4／5 買房計畫',f('price','房價',data.home.price)+sel('year','購屋年份',data.home.year,years())+sel('month','購屋月份',data.home.month,months())+f('ltv','貸款成數（%）',data.home.ltv,.1)+f('rate','房貸利率（%）',data.home.rate,.01)+f('years','房貸年限',data.home.years)+f('extra','交易、裝潢與家具',data.home.extra)+f('reserve','希望保留的現金',data.home.reserve)+f('monthlyOther','每月住房固定費',data.home.monthlyOther)+sel('mortgageYear','房貸起繳年份',data.home.mortgageYear,years())+sel('mortgageMonth','房貸起繳月份',data.home.mortgageMonth,months())+ck('useStocks','允許動用台股／ETF',data.home.useStocks)+ck('useInsurance','允許動用儲蓄險',data.home.useInsurance),'購屋資金會先使用超過保留金額的現金。',v=>{Object.assign(data.home,v);flowStep++;setTimeout(nextPlan,50)});else openModal('5／5 模擬範圍',sel('endYear','顯示結果至哪一年年底',data.meta.endYear,years()),'完成後回到結果頁。',v=>{Object.assign(data.meta,v);go('decision')})}
function editYear(y){const z=yearConfig(y);openModal(`${y} 年例外設定`,f('monthlySalary','月薪',z.monthlySalary)+f('annualSalary','年薪',z.annualSalary)+f('living','每月生活支出',z.living)+f('travel','每月旅遊基金',z.travel)+f('stocks','每月台股／ETF',z.stocks)+f('company','每月公司認股',z.company)+f('insuranceUSD','每月儲蓄險（USD）',z.insuranceUSD,.01)+f('fx','匯率',z.fx,.01),'只儲存這一年的差異。',v=>data.overrides[y]=v)}
function printReport(){renderReport();setTimeout(()=>window.print(),100)}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal()};document.getElementById('drawer').onclick=e=>{if(e.target.id==='drawer')closeDrawer()};
recalc();if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
</script>
</body></html>
