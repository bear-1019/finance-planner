<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<link rel="manifest" href="manifest.webmanifest">
<title>財務路線圖</title>
<style>
:root{
 --bg:#f7f4ee;--card:#fffdfa;--ink:#253b54;--muted:#7e8994;--line:#e6ded2;
 --navy:#304b63;--blue:#708f9d;--sage:#a4b7ad;--sand:#d5bd97;--rose:#c69d96;
 --good:#3c745e;--warn:#a5722b;--bad:#ad5050;--shadow:0 10px 30px rgba(45,55,65,.07)
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;line-height:1.5}
button,input{font:inherit}.app{max-width:980px;margin:auto;padding:12px 12px 96px}
.hero{background:linear-gradient(140deg,#304b63,#607e90 70%,#a1b4ab);color:#fff;border-radius:27px;padding:23px;box-shadow:var(--shadow)}
.hero-mark{width:48px;height:48px;border-radius:15px;background:rgba(255,255,255,.15);display:grid;place-items:center;margin-bottom:13px}.hero-mark svg{width:28px;height:28px}
.hero h1{margin:0;font-size:30px}.hero p{margin:6px 0 0;opacity:.9}.hero-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:17px}
.btn{border:0;border-radius:14px;padding:11px 15px;font-weight:800;cursor:pointer;background:var(--navy);color:#fff}.btn.white{background:#fff;color:var(--navy)}.btn.ghost{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.28)}.btn.soft{background:#eae5dc;color:var(--ink)}.btn.small{padding:8px 11px;font-size:13px}
.nav{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:7px;margin:13px 0;position:sticky;top:7px;z-index:20;background:rgba(247,244,238,.93);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:19px}
.nav button{border:0;background:transparent;border-radius:13px;padding:9px 4px;color:var(--muted);font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px}.nav button svg{width:19px;height:19px}.nav button.active{background:var(--navy);color:#fff}
.page{display:none}.page.active{display:block}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:17px;box-shadow:var(--shadow);margin:12px 0}
.head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:13px}.title{display:flex;gap:10px;align-items:flex-start}.ico{width:39px;height:39px;border-radius:13px;display:grid;place-items:center;flex:0 0 auto}.ico svg{width:21px;height:21px}.blue{background:#e7eef1;color:#5d7e8d}.sage{background:#e8efeb;color:#668173}.sand{background:#f4ebdc;color:#987039}.rose{background:#f3e7e5;color:#95645f}
h2,h3,h4,p{margin-top:0}.head h2{font-size:20px;margin:1px 0 0}.sub{font-size:14px;color:var(--muted);margin-top:4px}.badge{padding:7px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}.badge.good{background:#e5f1e9;color:var(--good)}.badge.warn{background:#f6eddc;color:var(--warn)}.badge.bad{background:#f5e5e3;color:var(--bad)}
.decision{border-radius:19px;padding:15px}.decision.good{background:#eaf3ed}.decision.warn{background:#f8f0e1}.decision.bad{background:#f7e8e6}.decision h3{font-size:18px;margin-bottom:6px}.decision p{margin-bottom:0}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-top:12px}.kpi{background:rgba(255,255,255,.65);border-radius:14px;padding:11px}.kpi small{display:block;color:var(--muted)}.kpi b{display:block;font-size:17px;margin-top:3px}.good-t{color:var(--good)}.bad-t{color:var(--bad)}
.routes{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.route{border-radius:17px;padding:13px;background:#f2eee7}.route.car{background:#eaf0f3}.route.home{background:#e8f0eb}.route small{display:block;color:var(--muted)}.route strong{display:block;font-size:18px;margin-top:4px}.route .delta{font-size:13px;margin-top:4px}
.step{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px;margin-bottom:10px}.step-top{display:flex;justify-content:space-between;gap:12px;align-items:center}.step-top h3{margin:0;font-size:18px}.step-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:11px}.sv{background:#f3efe8;border-radius:13px;padding:10px}.sv small{display:block;color:var(--muted)}.sv b{display:block;margin-top:3px}
.year-row{border:1px solid var(--line);border-radius:17px;background:#fff;overflow:hidden;margin-bottom:9px}.year-main{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:13px}.year-main h3{margin:0}.year-body{display:none;padding:0 13px 13px}.year-row.open .year-body{display:block}.mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.mini{background:#f3efe8;border-radius:12px;padding:10px}.mini small{display:block;color:var(--muted)}.mini b{display:block}
.scenario-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.scenario-tabs button{border:1px solid var(--line);background:#fff;border-radius:13px;padding:10px 4px;font-weight:800;color:var(--ink)}.scenario-tabs button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.timeline{position:relative;padding-left:20px}.timeline:before{content:"";position:absolute;left:7px;top:10px;bottom:10px;width:2px;background:#ddd4c8}.year-card{position:relative;border:1px solid var(--line);border-radius:20px;background:#fff;margin-bottom:12px;overflow:hidden}.year-card:before{content:"";position:absolute;left:-17px;top:24px;width:11px;height:11px;border-radius:50%;background:var(--blue);border:3px solid var(--bg)}.year-head{padding:15px}.year-top{display:flex;justify-content:space-between;gap:12px}.year-top h3{font-size:20px;margin:0}.asset-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}.asset{background:#f3efe8;border-radius:14px;padding:11px}.asset small{display:block;color:var(--muted)}.asset b{display:block;font-size:17px;margin-top:3px}.asset.ins{background:#eaf0ec}.year-actions{display:flex;justify-content:flex-end;margin-top:11px}.calc{display:none;border-top:1px solid var(--line);padding:13px;background:#fcfaf6}.year-card.open .calc{display:block}
.flow{display:grid;gap:9px}.flow-block{border-radius:16px;padding:12px}.flow-block.cash{background:#eaf1f4}.flow-block.asset{background:#f3eee4}.flow-block.ins{background:#eaf1ec}.flow-block.total{background:#e8f1eb}.flow-block h4{display:flex;justify-content:space-between;gap:12px;margin:0 0 6px}.line{display:flex;justify-content:space-between;gap:13px;padding:5px 0;border-bottom:1px dashed rgba(50,65,80,.15);font-size:13px}.line:last-child{border-bottom:0}.line span{color:#6f7d89}.line b{text-align:right}.formula{padding-top:7px;margin-top:6px;border-top:2px solid rgba(50,65,80,.13);font-weight:800}
.report-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.report-preview{background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px;margin-top:13px}.report-cover{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}.report-summary{background:#f3efe8;border-radius:14px;padding:12px}.report-summary h3{margin-bottom:7px}.report-section{margin-top:16px;page-break-before:always}.report-section:first-of-type{page-break-before:auto}.report-section h3{font-size:17px;margin-bottom:6px}
.report-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.report-year-card{border:1px solid #e5ddd2;border-radius:10px;padding:8px;background:#fff}.report-year-card h4{font-size:12px;margin:0 0 5px}.report-year-card .rline{display:flex;justify-content:space-between;font-size:9.5px;padding:2px 0}.report-year-card .rline b{text-align:right}.report-year-card .total{border-top:1px solid #ddd4c8;margin-top:3px;padding-top:3px;font-weight:800}
.asset-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:10px}.asset-chip{background:#f3efe8;border-radius:12px;padding:9px}.asset-chip small{display:block;color:var(--muted);font-size:12px}.asset-chip b{display:block;font-size:14px;margin-top:2px}
.drawer{position:fixed;inset:0;background:rgba(31,42,55,.45);z-index:110;display:none;align-items:flex-end;padding:14px}.drawer.show{display:flex}.drawer-panel{width:min(760px,100%);max-height:88vh;overflow:auto;margin:auto;background:var(--card);border-radius:24px 24px 18px 18px;padding:16px}.drawer-head{position:sticky;top:-16px;background:var(--card);z-index:2;display:flex;justify-content:space-between;align-items:center;padding:2px 0 12px}
.report-year-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.report-year{border:1px solid #e4dcd0;border-radius:11px;padding:9px;background:#fff;page-break-inside:avoid}.report-year h4{margin:0 0 6px;font-size:13px}.rgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px 8px}.rline{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px dashed #e6ded2}.rline.total{grid-column:1/-1;border-top:1px solid #d8d0c4;border-bottom:0;margin-top:3px;padding-top:4px;font-weight:800}
.modal{position:fixed;inset:0;background:rgba(31,42,55,.45);z-index:100;display:none;align-items:flex-end;padding:15px}.modal.show{display:flex}.sheet{width:min(720px,100%);max-height:91vh;overflow:auto;margin:auto;background:var(--card);border-radius:24px 24px 18px 18px;padding:17px}.sheet-head{position:sticky;top:-17px;background:var(--card);z-index:2;display:flex;justify-content:space-between;align-items:center;padding:3px 0 12px}.sheet-head-actions{display:flex;gap:8px;align-items:center}.close{border:0;background:#e9e5dd;width:38px;height:38px;border-radius:50%;font-size:20px;color:var(--ink)}.fields{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field label{display:block;color:var(--muted);font-size:13px;margin-bottom:5px}.field input,.field select{width:100%;border:1px solid #d8d0c4;border-radius:13px;padding:12px;font-size:17px;color:var(--ink);background:#fff}.field.check{background:#f2eee7;border-radius:13px;padding:12px;display:flex;align-items:center;gap:8px}.field.check input{width:auto}.field.check label{margin:0;color:var(--ink);font-weight:700}.sheet-note{background:#f3efe8;color:var(--muted);padding:10px;border-radius:13px;font-size:13px;margin-top:10px}.sheet-actions{position:sticky;bottom:-17px;background:var(--card);display:flex;gap:9px;padding:12px 0 3px}.sheet-actions .btn{flex:1}
@media(max-width:680px){.app{padding:10px 10px 90px}.hero{padding:20px}.nav button{font-size:12px}.routes,.kpis,.step-grid,.mini-grid,.asset-grid,.fields,.report-actions,.report-cover,.report-year-grid{grid-template-columns:1fr}.asset-strip{grid-template-columns:repeat(2,1fr)}.scenario-tabs button{font-size:12px}.timeline{padding-left:16px}.timeline:before{left:5px}.year-card:before{left:-14px}}
@page{size:A4 portrait;margin:10mm}
@media print{
 body{background:#fff}.app{max-width:none;padding:0}.hero,.nav,#dashboard,#setup,#annual,.report-actions{display:none!important}#report{display:block!important}.card{border:0;box-shadow:none;padding:0;margin:0}.report-preview{border:0;padding:0;margin:0}.report-cover{grid-template-columns:1.1fr .9fr}.report-section{page-break-before:always;margin-top:0}.report-section:first-of-type{page-break-before:auto}.report-section h3{font-size:13px;margin:0 0 4px}.report-year-grid{grid-template-columns:repeat(2,1fr);gap:6px}.report-year{padding:7px}.report-year h4{font-size:11px}.rline{font-size:8.5px}.report-summary{padding:7px}.report-preview h2{font-size:18px;margin-bottom:3px}.sub{font-size:9px}
}
</style>
</head>
<body>
<div class="app">
<header class="hero">
 <div class="hero-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V9m6 10V5m6 14v-7m4 7H2"/><path d="m4 8 6-4 6 7 4-3"/></svg></div>
 <h1>財務路線圖</h1><p>以清楚、可追溯的方式比較買車、買房與都不買時，現金與資產會產生多少差異。</p>
 <div class="hero-actions"><button class="btn white" onclick="go('dashboard')">查看結論</button><button class="btn ghost" onclick="go('setup')">設定計畫</button></div>
</header>
<nav class="nav">
 <button class="active" data-page="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12 12 4l9 8"/><path d="M5 10v10h14V10"/></svg>總覽</button>
 <button data-page="setup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h16"/><circle cx="8" cy="5" r="2"/><circle cx="15" cy="12" r="2"/><circle cx="10" cy="19" r="2"/></svg>設定</button>
 <button data-page="annual"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4m8-4v4M3 9h18"/></svg>年度</button>
 <button data-page="report"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2h9l5 5v15H6z"/><path d="M14 2v6h6M9 13h6m-6 4h6"/></svg>報告</button>
</nav>

<section id="dashboard" class="page active">
 <article class="card"><div class="head"><div class="title"><div class="ico blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 15h18l-2-6H5z"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg></div><div><h2>買車結論</h2><div class="sub">交車時現金與後續年度負擔。</div></div></div><span id="carBadge" class="badge">—</span></div><div id="carDecision"></div></article>
 <article class="card"><div class="head"><div class="title"><div class="ico sage"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11 12 3l9 8"/><path d="M5 10v11h14V10M9 21v-7h6v7"/></svg></div><div><h2>買房結論</h2><div class="sub">購屋資金與房貸開始後的現金流。</div></div></div><span id="homeBadge" class="badge">—</span></div><div id="homeDecision"></div></article>
 <article class="card"><div class="head"><div class="title"><div class="ico sand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19V9m6 10V5m6 14v-7m4 7H2"/></svg></div><div><h2>三種路線比較</h2><div class="sub">以買房目標年度比較年底資產。</div></div></div><span id="compareYear" class="badge warn"></span></div><div id="routes" class="routes"></div></article>
</section>

<section id="setup" class="page">
 <article class="card"><div class="head"><div class="title"><div class="ico blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 5h16M4 12h16M4 19h16"/></svg></div><div><h2>計畫設定</h2><div class="sub">分四步驟設定，平常只顯示摘要。</div></div></div></div>
  <div class="step"><div class="step-top"><h3>1. 起始資產</h3><button class="btn soft small" onclick="editStart()">編輯</button></div><div id="startSetup" class="step-grid"></div></div>
  <div class="step"><div class="step-top"><h3>2. 逐年收入與分配</h3><button class="btn soft small" onclick="editRange()">顯示範圍</button></div><div id="yearSetup" style="margin-top:11px"></div></div>
  <div class="step"><div class="step-top"><h3>3. 買車計畫</h3><button class="btn soft small" onclick="editCar()">編輯</button></div><div id="carSetup" class="step-grid"></div></div>
  <div class="step"><div class="step-top"><h3>4. 買房計畫</h3><button class="btn soft small" onclick="editHome()">編輯</button></div><div id="homeSetup" class="step-grid"></div></div>
 </article>
</section>

<section id="annual" class="page">
 <article class="card"><div class="head"><div class="title"><div class="ico blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4m8-4v4M3 9h18"/></svg></div><div><h2>年度資產時間軸</h2><div class="sub">先看年底餘額，點開才顯示完整計算。</div></div></div></div>
 <div class="scenario-tabs"><button class="active" data-scenario="base">都不買</button><button data-scenario="car">只買車</button><button data-scenario="home">買車再買房</button></div><div id="timeline" class="timeline"></div></article>
</section>

<section id="report" class="page">
 <article class="card"><div class="head"><div class="title"><div class="ico sand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2h9l5 5v15H6z"/><path d="M14 2v6h6M9 13h6m-6 4h6"/></svg></div><div><h2>精簡完整報告</h2><div class="sub">PDF 改成年度卡片矩陣，避免寬表與大量頁數。</div></div></div></div>
 <div class="report-actions"><button class="btn" onclick="printReport()">匯出 PDF</button><button class="btn soft" onclick="exportHTML()">匯出 HTML</button><button class="btn soft" onclick="exportCSV()">匯出 CSV</button><button class="btn soft" onclick="exportJSON()">備份設定</button></div><div id="reportPreview" class="report-preview"></div></article>
</section>
</div>

<div class="modal" id="modal"><div class="sheet"><div class="sheet-head"><h2 id="modalTitle">編輯</h2><div class="sheet-head-actions"><button class="btn small" onclick="saveModal()">儲存</button><button class="close" onclick="closeModal()">×</button></div></div><div id="modalFields" class="fields"></div><div id="modalNote" class="sheet-note"></div><div class="sheet-actions"><button class="btn soft" onclick="closeModal()">取消</button><button class="btn" onclick="saveModal()">儲存</button></div></div></div>
<div class="drawer" id="drawer"><div class="drawer-panel"><div class="drawer-head"><h2 id="drawerTitle">完整計算</h2><button class="close" onclick="closeDrawer()">×</button></div><div id="drawerBody"></div></div></div>

<script>
const Y0=2027,MAX_YEAR=2045,KEY='financeV13';
const D={meta:{endYear:2035},start:{cash:840000,stocks:180000,company:60000,insuranceUSD:8000,fx:31.5},years:{},car:{price:1899900,down:399900,rate:2.5,months:120,fee:2000,year:2027,month:7,insurance:3500,energy:1500,parking:2500,maintenance:1000,tax:0,other:500},home:{price:20000000,year:2031,month:7,ltv:85,rate:2.5,years:40,extra:1500000,reserve:500000,monthlyOther:6000,mortgageYear:2031,mortgageMonth:8,useStocks:false,useInsurance:false}};
for(let y=Y0;y<=MAX_YEAR;y++)D.years[y]={monthlySalary:90000,annualSalary:y===2027?1800000:y===2028?1900000:y<=2030?2000000:2100000+(y-2031)*100000,living:40000,travel:10000,insuranceUSD:317.46,company:6000,stocks:14000,specialIncome:0,specialExpense:0,fx:31.5};
let data=JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(D),results={},scenario='base',saveFn=null;if(!data.meta)data.meta={endYear:2035};
const fmt=n=>new Intl.NumberFormat('zh-TW',{style:'currency',currency:'TWD',maximumFractionDigits:0}).format(Math.round(n||0));
const usd=n=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(n||0);
const ym=(y,m)=>y*12+m;
function pmt(P,a,n){const r=a/100/12;if(!n)return 0;return r?P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1):P/n}
function bal(P,a,n,k){if(k>=n)return 0;const r=a/100/12,m=pmt(P,a,n);return r?P*Math.pow(1+r,k)-m*(Math.pow(1+r,k)-1)/r:Math.max(0,P-m*k)}
function useHome(a,need,fx){let cash=Math.min(Math.max(0,a.cash-data.home.reserve),need);a.cash-=cash;need-=cash;let stocks=0,insTWD=0,insUSD=0;if(need>0&&data.home.useStocks){stocks=Math.min(a.stocks,need);a.stocks-=stocks;need-=stocks}if(need>0&&data.home.useInsurance){insTWD=Math.min(a.insuranceUSD*fx,need);insUSD=insTWD/fx;a.insuranceUSD-=insUSD;need-=insTWD}if(need>0){a.cash-=need;cash+=need}return{cash,stocks,insTWD,insUSD}}
function simulate(mode){
 let a={cash:data.start.cash,stocks:data.start.stocks,company:data.start.company,insuranceUSD:data.start.insuranceUSD},out=[],carPaid=0,mortPaid=0,bought=false;
 const carLoan=data.car.price-data.car.down,carPay=pmt(carLoan,data.car.rate,data.car.months),homeLoan=data.home.price*data.home.ltv/100,mortPay=pmt(homeLoan,data.home.rate,data.home.years*12);
 const buyKey=ym(data.home.year,data.home.month),mortKey=Math.max(buyKey,ym(data.home.mortgageYear,data.home.mortgageMonth));
 for(let y=Y0;y<=data.meta.endYear;y++){
  const z=data.years[y],start={...a},bonus=Math.max(0,z.annualSalary-z.monthlySalary*12);
  let carOne=0,carLoanMonths=0,carFixedMonths=0,homeCash=0,homeStocks=0,homeInsTWD=0,homeInsUSD=0,mortMonths=0,homeFixedMonths=0;
  for(let m=1;m<=12;m++){
   a.cash+=z.monthlySalary-z.living-z.travel-z.stocks-z.company-z.insuranceUSD*z.fx;a.stocks+=z.stocks;a.company+=z.company;a.insuranceUSD+=z.insuranceUSD;
   const k=ym(y,m);
   if((mode==='car'||mode==='home')&&k>=ym(data.car.year,data.car.month)){if(k===ym(data.car.year,data.car.month)){carOne=data.car.down+data.car.fee;a.cash-=carOne}if(carPaid<data.car.months){a.cash-=carPay;carPaid++;carLoanMonths++}a.cash-=data.car.insurance+data.car.energy+data.car.parking+data.car.maintenance+data.car.tax+data.car.other;carFixedMonths++}
   if(mode==='home'&&k===buyKey&&!bought){const need=(data.home.price-homeLoan)+data.home.extra,u=useHome(a,need,z.fx);homeCash=u.cash;homeStocks=u.stocks;homeInsTWD=u.insTWD;homeInsUSD=u.insUSD;bought=true}
   if(mode==='home'&&bought&&k>=buyKey){a.cash-=data.home.monthlyOther;homeFixedMonths++}
   if(mode==='home'&&bought&&k>=mortKey&&mortPaid<data.home.years*12){a.cash-=mortPay;mortPaid++;mortMonths++}
  }
  a.cash+=bonus+z.specialIncome-z.specialExpense;const insTWD=a.insuranceUSD*z.fx;
  out.push({year:y,start,end:{...a},total:a.cash+a.stocks+a.company+insTWD,insTWD,z,bonus,carOne,carPay,carLoanMonths,carFixed:data.car.insurance+data.car.energy+data.car.parking+data.car.maintenance+data.car.tax+data.car.other,carFixedMonths,homeCash,homeStocks,homeInsTWD,homeInsUSD,mortPay,mortMonths,homeFixed:data.home.monthlyOther,homeFixedMonths,carBal:bal(carLoan,data.car.rate,data.car.months,carPaid),mortBal:bal(homeLoan,data.home.rate,data.home.years*12,mortPaid)});
 }
 return out
}
function recalc(){results={base:simulate('base'),car:simulate('car'),home:simulate('home')};localStorage.setItem(KEY,JSON.stringify(data));renderAll()}

function status(el,text,type){el.textContent=text;el.className='badge '+type}
function renderDashboard(){
 const ci=Math.max(0,Math.min(results.base.length-1,data.car.year-Y0)),hi=Math.max(0,Math.min(results.base.length-1,data.home.year-Y0));const c=results.car[ci],bc=results.base[ci],h=results.home[hi],bh=results.base[hi],ch=results.car[hi];
 const cCash=c.end.cash-c.start.cash,cOk=c.end.cash>=data.home.reserve&&cCash>=0;status(document.getElementById('carBadge'),cOk?'可負擔':c.end.cash>=0?'需要調整':'負擔過重',cOk?'good':c.end.cash>=0?'warn':'bad');
 document.getElementById('carDecision').innerHTML=`<div class="decision ${cOk?'good':c.end.cash>=0?'warn':'bad'}"><h3>${cOk?'買車後仍能累積現金':'買車會明顯壓縮現金'}</h3><p>${data.car.year} 年 ${data.car.month} 月交車，年底現金 ${fmt(c.end.cash)}，較都不買少 ${fmt(bc.end.cash-c.end.cash)}。</p><div class="kpis"><div class="kpi"><small>每月車貸</small><b>${fmt(c.carPay)}</b></div><div class="kpi"><small>每月固定養車費</small><b>${fmt(c.carFixed)}</b></div><div class="kpi"><small>交車年度車輛總支出</small><b>${fmt(c.carOne+c.carPay*c.carLoanMonths+c.carFixed*c.carFixedMonths)}</b></div><div class="kpi"><small>交車年度現金淨變動</small><b class="${cCash>=0?'good-t':'bad-t'}">${fmt(cCash)}</b></div></div></div>`;
 const need=data.home.price*(1-data.home.ltv/100)+data.home.extra,paid=h.homeCash+h.homeStocks+h.homeInsTWD,hd=h.end.cash-h.start.cash,sourceOk=paid>=need-1,homeOk=sourceOk&&h.end.cash>=0&&hd>=0;status(document.getElementById('homeBadge'),homeOk?'可負擔':sourceOk?'後續偏緊':'資金不足',homeOk?'good':sourceOk?'warn':'bad');
 document.getElementById('homeDecision').innerHTML=`<div class="decision ${homeOk?'good':sourceOk?'warn':'bad'}"><h3>${homeOk?'購屋資金與房貸現金流皆可承擔':sourceOk?'買得下，但購屋年度壓力偏高':'目標年份資金尚不足'}</h3><p>${data.home.year} 年 ${data.home.month} 月購屋，房貸自 ${data.home.mortgageYear} 年 ${data.home.mortgageMonth} 月開始；一次性需求 ${fmt(need)}。</p><div class="kpis"><div class="kpi"><small>現金動用</small><b>${fmt(h.homeCash)}</b></div><div class="kpi"><small>股票動用</small><b>${fmt(h.homeStocks)}</b></div><div class="kpi"><small>儲蓄險動用</small><b>${usd(h.homeInsUSD)}</b></div><div class="kpi"><small>每月房貸＋住房費</small><b>${fmt(h.mortPay+h.homeFixed)}</b></div><div class="kpi"><small>購屋年度現金淨變動</small><b class="${hd>=0?'good-t':'bad-t'}">${fmt(hd)}</b></div><div class="kpi"><small>購屋年底現金</small><b>${fmt(h.end.cash)}</b></div></div></div>`;
 document.getElementById('compareYear').textContent=data.home.year+' 年底';document.getElementById('routes').innerHTML=[['都不買','',bh],['只買車','car',ch],['買車再買房','home',h]].map(([n,cl,r])=>`<div class="route ${cl}"><small>${n}</small><strong>${fmt(r.total)}</strong><div class="delta">現金 ${fmt(r.end.cash)}<br>較都不買 ${fmt(r.total-bh.total)}</div></div>`).join('');
}

function renderSetup(){
 document.getElementById('startSetup').innerHTML=sv('現金',fmt(data.start.cash))+sv('台股／ETF',fmt(data.start.stocks))+sv('公司認股',fmt(data.start.company))+sv('美元儲蓄險',usd(data.start.insuranceUSD));
 let years='';for(let y=Y0;y<=data.meta.endYear;y++){const z=data.years[y];years+=`<div class="year-row"><div class="year-main"><div><h3>${y} 年底設定</h3><div class="sub">年薪 ${fmt(z.annualSalary)}｜月薪 ${fmt(z.monthlySalary)}</div></div><div><button class="btn soft small" onclick="editYear(${y})">編輯</button> <button class="btn soft small" onclick="this.closest('.year-row').classList.toggle('open')">摘要</button></div></div><div class="year-body"><div class="mini-grid"><div class="mini"><small>生活＋旅遊／月</small><b>${fmt(z.living+z.travel)}</b></div><div class="mini"><small>股票＋公司認股／月</small><b>${fmt(z.stocks+z.company)}</b></div><div class="mini"><small>儲蓄險／月</small><b>${usd(z.insuranceUSD)}</b></div><div class="mini"><small>特殊收支淨額</small><b>${fmt(z.specialIncome-z.specialExpense)}</b></div></div></div></div>`}document.getElementById('yearSetup').innerHTML=`<div class="sub" style="margin-bottom:9px">目前顯示至 ${data.meta.endYear} 年底</div>`+years;
 const loan=data.car.price-data.car.down;document.getElementById('carSetup').innerHTML=sv('車價',fmt(data.car.price))+sv('頭期款',fmt(data.car.down))+sv('每月車貸',fmt(pmt(loan,data.car.rate,data.car.months)))+sv('交車時間',`${data.car.year} 年 ${data.car.month} 月`);
 const hl=data.home.price*data.home.ltv/100;document.getElementById('homeSetup').innerHTML=sv('房價',fmt(data.home.price))+sv('購屋時間',`${data.home.year} 年 ${data.home.month} 月`)+sv('房貸起繳',`${data.home.mortgageYear} 年 ${data.home.mortgageMonth} 月`)+sv('每月房貸',fmt(pmt(hl,data.home.rate,data.home.years*12)));
}
function line(k,v,cl=''){return `<div class="line"><span>${k}</span><b class="${cl}">${v}</b></div>`}
function calcHtml(r){const z=r.z,monthly=z.monthlySalary-z.living-z.travel-z.stocks-z.company-z.insuranceUSD*z.fx;return `<div class="flow"><div class="flow-block cash"><h4><span>現金</span><b>${fmt(r.end.cash)}</b></h4>${line('前一年底',fmt(r.start.cash))}${line('每月結餘 × 12',`${fmt(monthly)} × 12 = ${fmt(monthly*12)}`)}${line('年終／分紅','＋ '+fmt(r.bonus),'good-t')}${line('特殊收入','＋ '+fmt(z.specialIncome),'good-t')}${line('特殊支出','− '+fmt(z.specialExpense),'bad-t')}${r.carOne?line('買車頭期與費用','− '+fmt(r.carOne),'bad-t'):''}${r.carLoanMonths?line('車貸',`− ${fmt(r.carPay)} × ${r.carLoanMonths} = ${fmt(r.carPay*r.carLoanMonths)}`,'bad-t'):''}${r.carFixedMonths?line('固定養車費',`− ${fmt(r.carFixed)} × ${r.carFixedMonths} = ${fmt(r.carFixed*r.carFixedMonths)}`,'bad-t'):''}${r.homeCash?line('購屋由現金支付','− '+fmt(r.homeCash),'bad-t'):''}${r.mortMonths?line('房貸',`− ${fmt(r.mortPay)} × ${r.mortMonths} = ${fmt(r.mortPay*r.mortMonths)}`,'bad-t'):''}${r.homeFixedMonths?line('住房固定費',`− ${fmt(r.homeFixed)} × ${r.homeFixedMonths} = ${fmt(r.homeFixed*r.homeFixedMonths)}`,'bad-t'):''}<div class="formula">${line('今年底現金',fmt(r.end.cash))}</div></div><div class="flow-block asset"><h4><span>台股／ETF</span><b>${fmt(r.end.stocks)}</b></h4>${line('前一年底',fmt(r.start.stocks))}${line('每月投入 × 12',`${fmt(z.stocks)} × 12 = ${fmt(z.stocks*12)}`)}${r.homeStocks?line('購屋動用','− '+fmt(r.homeStocks),'bad-t'):''}<div class="formula">${line('今年底',fmt(r.end.stocks))}</div></div><div class="flow-block asset"><h4><span>公司認股</span><b>${fmt(r.end.company)}</b></h4>${line('前一年底',fmt(r.start.company))}${line('每月投入 × 12',`${fmt(z.company)} × 12 = ${fmt(z.company*12)}`)}<div class="formula">${line('今年底',fmt(r.end.company))}</div></div><div class="flow-block ins"><h4><span>美元儲蓄險</span><b>${usd(r.end.insuranceUSD)}</b></h4>${line('前一年底',usd(r.start.insuranceUSD))}${line('每月投入 × 12',`${usd(z.insuranceUSD)} × 12 = ${usd(z.insuranceUSD*12)}`)}${r.homeInsUSD?line('購屋動用','− '+usd(r.homeInsUSD),'bad-t'):''}${line('當年匯率',z.fx)}<div class="formula">${line('台幣估值',fmt(r.insTWD))}</div></div><div class="flow-block total"><h4><span>年底總金融資產</span><b>${fmt(r.total)}</b></h4>${line('現金',fmt(r.end.cash))}${line('台股／ETF',fmt(r.end.stocks))}${line('公司認股',fmt(r.end.company))}${line('儲蓄險台幣估值',fmt(r.insTWD))}</div></div>`}
function renderTimeline(){const nm={base:'都不買',car:'只買車',home:'買車再買房'};document.getElementById('timeline').innerHTML=results[scenario].map((r,i)=>`<article class="year-card"><div class="year-top"><div><h3>${r.year} 年底</h3><div class="sub">${nm[scenario]}｜現金淨變動 <span class="${r.end.cash-r.start.cash>=0?'good-t':'bad-t'}">${fmt(r.end.cash-r.start.cash)}</span></div></div><b>${fmt(r.total)}</b></div><div class="asset-strip"><div class="asset-chip"><small>現金</small><b>${fmt(r.end.cash)}</b></div><div class="asset-chip"><small>台股／ETF</small><b>${fmt(r.end.stocks)}</b></div><div class="asset-chip"><small>公司認股</small><b>${fmt(r.end.company)}</b></div><div class="asset-chip"><small>儲蓄險</small><b>${usd(r.end.insuranceUSD)}</b></div></div><div class="year-actions"><button class="btn soft small" onclick="openDrawer('${scenario}',${i})">查看完整計算</button></div></article>`).join('')}

function renderReport(){const names={base:'都不買',car:'只買車',home:'買車再買房'};let html=`<div class="report-cover"><div><h2>財務路線圖完整報告</h2><div class="sub">結果顯示至 ${data.meta.endYear} 年底｜${new Date().toLocaleString('zh-TW')}</div></div><div class="report-summary"><h3>關鍵設定</h3><div>買車：${data.car.year}/${data.car.month}</div><div>買房：${data.home.year}/${data.home.month}</div><div>房貸起繳：${data.home.mortgageYear}/${data.home.mortgageMonth}</div></div></div>`;for(const k of ['base','car','home']){html+=`<section class="report-section"><h3>${names[k]}</h3><div class="report-year-grid">`;for(const r of results[k])html+=`<div class="report-year"><h4>${r.year} 年底</h4><div class="rgrid"><div class="rline"><span>現金</span><b>${fmt(r.end.cash)}</b></div><div class="rline"><span>股票</span><b>${fmt(r.end.stocks)}</b></div><div class="rline"><span>認股</span><b>${fmt(r.end.company)}</b></div><div class="rline"><span>儲蓄險</span><b>${fmt(r.insTWD)}</b></div><div class="rline"><span>現金變動</span><b>${fmt(r.end.cash-r.start.cash)}</b></div><div class="rline"><span>車貸</span><b>${fmt(r.carPay*r.carLoanMonths)}</b></div><div class="rline"><span>養車</span><b>${fmt(r.carFixed*r.carFixedMonths)}</b></div><div class="rline"><span>購屋現金</span><b>${fmt(r.homeCash)}</b></div><div class="rline"><span>房貸</span><b>${fmt(r.mortPay*r.mortMonths)}</b></div><div class="rline"><span>住房費</span><b>${fmt(r.homeFixed*r.homeFixedMonths)}</b></div><div class="rline total"><span>總資產</span><b>${fmt(r.total)}</b></div></div></div>`;html+=`</div></section>`}document.getElementById('reportPreview').innerHTML=html}
